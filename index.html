<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>язык · бело‑жёлтый</title>
    <!-- Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: #ffffff;
            color: #000000;
            line-height: 1.5;
        }

        .app {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* ---------- Боковое меню (насыщенный жёлтый) ---------- */
        .sidebar {
            width: 290px;
            background-color: #FFB800;  /* яркий жёлтый */
            color: #000000;
            padding: 2rem 1.5rem;
            transition: width 0.25s ease, padding 0.25s ease;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            position: relative;
            box-shadow: 4px 0 15px rgba(0, 0, 0, 0.15);
            border-radius: 0 20px 20px 0;
        }

        .close-menu {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            background: #ffffff;
            border: none;
            font-size: 1.8rem;
            line-height: 1;
            cursor: pointer;
            color: #000000;
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 30px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: 0.15s;
            font-weight: 600;
        }
        .close-menu:hover {
            background-color: #000000;
            color: #FFB800;
            transform: scale(1.03);
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.2);
        }

        .sidebar .logo-container {
            margin-bottom: 2rem;
            padding-right: 2.5rem;
        }

        /* Логотип: только тень, без фона и обводки */
        .sidebar .logo {
            max-width: 100%;
            height: auto;
            display: block;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.35);
            transition: transform 0.2s, box-shadow 0.2s;
            /* никакого фона, padding или border */
        }
        .sidebar .logo:hover {
            transform: scale(1.02);
            box-shadow: 0 18px 30px rgba(0, 0, 0, 0.45);
        }

        .menu-item {
            background: #ffffff;
            border: none;
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: 500;
            text-align: left;
            padding: 1rem 1.5rem;
            color: #000000;
            cursor: pointer;
            width: 100%;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.08);
            transition: 0.15s;
            border: 1px solid rgba(0, 0, 0, 0.05);
        }
        .menu-item:hover {
            background-color: #000000;
            color: #FFB800;
            transform: translateY(-2px);
            box-shadow: 0 10px 18px rgba(0, 0, 0, 0.2);
        }
        .menu-item.active {
            background-color: #000000;
            color: #FFB800;
            font-weight: 700;
            box-shadow: 0 8px 12px rgba(0, 0, 0, 0.25);
            border: 1px solid #ffffff;
        }

        /* ---------- Основная белая часть ---------- */
        .main-content {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
            box-shadow: inset 0 0 0 1px rgba(0,0,0,0.03);
        }

        .open-menu {
            position: absolute;
            top: 1.8rem;
            left: 1.8rem;
            background: #FFB800;
            border: none;
            font-size: 2.6rem;
            padding: 0.2rem 1.2rem 0.5rem 1.2rem;
            cursor: pointer;
            color: #000000;
            z-index: 10;
            display: none;
            font-weight: 500;
            line-height: 1;
            border-radius: 50px;
            box-shadow: 0 6px 14px rgba(0, 0, 0, 0.15);
            transition: 0.15s;
        }
        .open-menu:hover {
            background-color: #000000;
            color: #FFB800;
            transform: scale(1.02);
            box-shadow: 0 12px 20px rgba(0, 0, 0, 0.25);
        }

        .content-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2.5rem;
        }

        .pane-container {
            width: 100%;
            max-width: 800px;
            background-color: #ffffff;
            border-radius: 40px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.25);
            padding: 3rem 2.5rem;
            text-align: center;
            border: 1px solid #f0f0f0;
        }

        .tab-pane {
            display: none;
        }
        .tab-pane.active-pane {
            display: block;
        }

        .placeholder-message {
            font-size: 2.5rem;
            font-weight: 400;
            color: #000000;
            line-height: 1.4;
        }
        .placeholder-message small {
            display: block;
            font-size: 1.4rem;
            color: #333333;
            font-weight: 300;
            margin-top: 1.5rem;
            border-top: 1px solid #ccc;
            padding-top: 1.2rem;
        }

        /* --- Скрытое меню --- */
        .app.sidebar-collapsed .sidebar {
            width: 0;
            padding: 0;
            box-shadow: none;
        }
        .app.sidebar-collapsed .open-menu {
            display: block;
        }

        /* --- Адаптивность --- */
        @media (max-width: 700px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                border-radius: 0 0 20px 20px;
                box-shadow: 0 8px 18px rgba(0, 0, 0, 0.15);
                padding: 1.5rem;
            }
            .close-menu {
                top: 0.8rem;
                right: 1rem;
            }
            .app.sidebar-collapsed .sidebar {
                width: 0;
                padding: 0;
            }
            .open-menu {
                top: 1rem;
                left: 1rem;
                font-size: 2.4rem;
            }
            .pane-container {
                padding: 2rem 1.5rem;
            }
        }

        @media (max-width: 450px) {
            .menu-item {
                font-size: 1.3rem;
                padding: 0.8rem 1rem;
            }
            .placeholder-message {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Боковое меню с логотипом (только тень, никакого белого фона) -->
        <div class="sidebar" id="sidebar">
            <button class="close-menu" id="closeMenuBtn" aria-label="Закрыть меню">✕</button>
            <div class="logo-container">
                <img src="logo.png" alt="логотип" class="logo">
            </div>
            <button class="menu-item active" data-tab="about">О языке</button>
            <button class="menu-item" data-tab="alphabet">Алфавит</button>
            <button class="menu-item" data-tab="rules">Правила</button>
            <button class="menu-item" data-tab="exercises">Упражнения</button>
        </div>

        <!-- Основная белая область -->
        <div class="main-content">
            <button class="open-menu" id="openMenuBtn">☰</button>
            <div class="content-center">
                <div class="pane-container">
                    <div id="about" class="tab-pane active-pane">
                        <div class="placeholder-message">
                            🌅 ничего нет
                            <small>раздел о языке</small>
                        </div>
                    </div>
                    <div id="alphabet" class="tab-pane">
                        <div class="placeholder-message">
                            🔤 ничего нет
                            <small>алфавит</small>
                        </div>
                    </div>
                    <div id="rules" class="tab-pane">
                        <div class="placeholder-message">
                            📘 ничего нет
                            <small>правила</small>
                        </div>
                    </div>
                    <div id="exercises" class="tab-pane">
                        <div class="placeholder-message">
                            ✏️ ничего нет
                            <small>упражнения</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const app = document.getElementById('app');
            const closeBtn = document.getElementById('closeMenuBtn');
            const openBtn = document.getElementById('openMenuBtn');

            const menuItems = document.querySelectorAll('.menu-item');
            const panes = {
                about: document.getElementById('about'),
                alphabet: document.getElementById('alphabet'),
                rules: document.getElementById('rules'),
                exercises: document.getElementById('exercises')
            };

            closeBtn.addEventListener('click', () => {
                app.classList.add('sidebar-collapsed');
            });

            openBtn.addEventListener('click', () => {
                app.classList.remove('sidebar-collapsed');
            });

            function switchTab(tabId) {
                menuItems.forEach(item => item.classList.remove('active'));
                const activeItem = document.querySelector(`.menu-item[data-tab="${tabId}"]`);
                if (activeItem) activeItem.classList.add('active');

                Object.values(panes).forEach(pane => pane?.classList.remove('active-pane'));
                if (panes[tabId]) panes[tabId].classList.add('active-pane');
            }

            menuItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    const tabId = item.getAttribute('data-tab');
                    switchTab(tabId);
                });
            });

            const initialActive = document.querySelector('.menu-item.active');
            if (initialActive) {
                const initialTab = initialActive.getAttribute('data-tab');
                if (initialTab && panes[initialTab]) {
                    Object.values(panes).forEach(p => p?.classList.remove('active-pane'));
                    panes[initialTab].classList.add('active-pane');
                }
            } else {
                switchTab('about');
            }
        })();
    </script>
</body>
</html>
