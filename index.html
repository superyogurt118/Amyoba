<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Язык · минимал</title>
    <!-- Строгий шрифт Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* Сброс */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #fae6d8;  /* мягкий оранжевый, без градиента */
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;  /* небольшие отступы от краёв */
            color: #2e2b28;
            line-height: 1.4;
        }

        /* Основной блок — белая карточка, строгая, без градиентов */
        .card {
            width: 100%;
            max-width: 1100px;        /* достаточно широко, но не вплотную */
            background-color: #ffffff;
            border-radius: 2rem;       /* мягкие углы, но можно убрать */
            padding: 2.5rem 2.5rem 3rem 2.5rem;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.03), 0 2px 4px rgba(0, 0, 0, 0.02);
            border: 1px solid #f0dac8; /* лёгкая граница в тон фона */
        }

        h1 {
            font-weight: 450;
            font-size: 2.8rem;
            letter-spacing: -0.02em;
            margin-bottom: 2rem;
            color: #4a3f38;
            border-bottom: 2px solid #edd7c5;
            padding-bottom: 0.8rem;
        }

        /* Вкладки — строго, без лишних эффектов */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem 1.2rem;
            margin-bottom: 2.2rem;
            border-bottom: 1px solid #e2d4c9;
            padding-bottom: 0.5rem;
        }

        .tab-button {
            background: none;
            border: none;
            padding: 0.5rem 0.2rem;
            font-size: 1.3rem;
            font-weight: 400;
            font-family: inherit;
            color: #5b4e44;
            cursor: pointer;
            transition: 0.15s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -0.5rem;  /* чтобы граница налезала на родительскую */
            letter-spacing: 0.3px;
        }

        .tab-button:hover {
            color: #c3672e;
            border-bottom-color: #f0cdb0;
        }

        .tab-button.active {
            font-weight: 550;
            color: #b15823;
            border-bottom-color: #b15823;
        }

        /* Контентная область */
        .content-area {
            background-color: #fcf7f2;   /* очень светлый тёплый фон */
            border-radius: 1.5rem;
            padding: 2.5rem 2rem;
            border: 1px solid #f2e1d2;
            min-height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Заглушка */
        .placeholder-message {
            font-size: 1.9rem;
            font-weight: 350;
            color: #aa7b5b;
            text-align: center;
            line-height: 1.5;
        }

        .placeholder-message small {
            display: block;
            font-size: 1.2rem;
            color: #b6967c;
            font-weight: 350;
            margin-top: 1rem;
            border-top: 1px dashed #e1cfbf;
            padding-top: 1rem;
        }

        /* Панели переключения */
        .tab-pane {
            display: none;
            width: 100%;
        }

        .tab-pane.active-pane {
            display: block;
        }

        /* адаптация */
        @media (max-width: 600px) {
            body {
                padding: 0.8rem;
            }
            .card {
                padding: 1.8rem 1.2rem;
                border-radius: 1.5rem;
            }
            h1 {
                font-size: 2.2rem;
            }
            .tab-button {
                font-size: 1.1rem;
            }
            .placeholder-message {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>язык · ʦ</h1>

        <div class="tabs" id="tabsContainer">
            <button class="tab-button active" data-tab="about">О языке</button>
            <button class="tab-button" data-tab="alphabet">Алфавит</button>
            <button class="tab-button" data-tab="rules">Правила</button>
            <button class="tab-button" data-tab="exercises">Упражнения</button>
        </div>

        <div class="content-area">
            <div id="about" class="tab-pane active-pane">
                <div class="placeholder-message">
                    🌅 ничего нет
                    <small>раздел об языке</small>
                </div>
            </div>
            <div id="alphabet" class="tab-pane">
                <div class="placeholder-message">
                    🔤 ничего нет
                    <small>алфавит</small>
                </div>
            </div>
            <div id="rules" class="tab-pane">
                <div class="placeholder-message">
                    📘 ничего нет
                    <small>правила</small>
                </div>
            </div>
            <div id="exercises" class="tab-pane">
                <div class="placeholder-message">
                    ✏️ ничего нет
                    <small>упражнения</small>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const tabs = document.querySelectorAll('.tab-button');
            const panes = {
                about: document.getElementById('about'),
                alphabet: document.getElementById('alphabet'),
                rules: document.getElementById('rules'),
                exercises: document.getElementById('exercises')
            };

            function switchTab(tabId) {
                tabs.forEach(btn => btn.classList.remove('active'));
                const activeBtn = document.querySelector(`.tab-button[data-tab="${tabId}"]`);
                if (activeBtn) activeBtn.classList.add('active');

                Object.values(panes).forEach(pane => pane?.classList.remove('active-pane'));
                if (panes[tabId]) panes[tabId].classList.add('active-pane');
            }

            tabs.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const tabId = btn.getAttribute('data-tab');
                    switchTab(tabId);
                });
            });

            // синхронизация при загрузке
            const activeTab = document.querySelector('.tab-button.active');
            if (activeTab) {
                const initialTab = activeTab.getAttribute('data-tab');
                if (initialTab && panes[initialTab]) {
                    Object.values(panes).forEach(p => p?.classList.remove('active-pane'));
                    panes[initialTab].classList.add('active-pane');
                }
            } else {
                switchTab('about');
            }
        })();
    </script>
</body>
</html>
