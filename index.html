<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакеатэ Мовын</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div id="speech-bubble"></div>

<header>
    <div class="logo-container" onclick="showSection('home')">
        <img id="main-logo" src="" alt="Лого" class="logo-img">
        <div class="logo-text">Вакеатэ Мовын</div>
    </div>
    <div class="nav-right">
        <span class="nav-links">
            <a onclick="showSection('alphabet')">Буквы</a>
            <a onclick="showSection('vocab')">Слова</a>
        </span>
        <button id="theme-btn" onclick="cycleTheme()">Тема</button>
    </div>
</header>

<main>
    <div id="loader">
        <div class="spinner"></div>
        <p>Загрузка данных...</p>
    </div>

    <div id="main-content" class="hidden">
        <section id="home" class="content-section active">
            <h1>Датчэ! 👋</h1>
            <p>Нажми на букву, чтобы увидеть её произношение. Буква **Ё** сохранена.</p>
        </section>

        <section id="alphabet" class="content-section">
            <h2>Алфавит</h2>
            <div class="grid" id="alpha-grid"></div>
        </section>

        <section id="vocab" class="content-section">
            <h2>Словарь</h2>
            <div id="vocab-list"></div>
        </section>
    </div>
</main>

<script src="js/script.js"></script>
</body>
</html>
