<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вакеатэ Мовын</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
    <div class="logo" onclick="showSection('home')">Вакеатэ Мовын</div>
    <div class="nav-right">
        <span class="nav-links">
            <a onclick="showSection('alphabet')">Буквы</a>
            <a onclick="showSection('vocab')">Слова</a>
        </span>
        <button id="theme-btn" onclick="cycleTheme()" style="margin-left:15px;">Тема</button>
    </div>
</header>

<main>
    <section id="home" class="content-section active">
        <h1>Датчэ!</h1>
        <p>Добро пожаловать. Нажми на иконку 🔊, чтобы услышать произношение.</p>
    </section>

    <section id="alphabet" class="content-section">
        <h2>Алфавит</h2>
        <div class="grid" id="alpha-grid"></div>
    </section>

    <section id="vocab" class="content-section">
        <h2>Словарь</h2>
        <div id="vocab-list"></div>
    </section>
</main>

<script src="js/script.js"></script>

</body>
</html>
