<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>язык · чисто</title>
    <!-- Inter для строгости, но можно любой гротеск -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&display=swap" rel="stylesheet">
    <style>
        /* АБСОЛЮТНЫЙ МИНИМАЛИЗМ: плоские цвета, чистый чёрный текст */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #ffffff; /* подложка, но всё определяется внутри */
            color: #000000;
            line-height: 1.4;
        }

        .app {
            display: flex;
            min-height: 100vh;
            width: 100%;
        }

        /* --- Боковое меню (оранжевое, плоское) --- */
        .sidebar {
            width: 280px;
            background-color: #ffa500;  /* чистый яркий оранжевый */
            color: #000000;
            padding: 2rem 1.5rem;
            transition: width 0.2s ease, padding 0.2s ease;
            white-space: nowrap;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            position: relative;
            border-right: none;  /* никаких лишних линий */
        }

        .close-menu {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            background: none;
            border: none;
            font-size: 1.8rem;
            line-height: 1;
            cursor: pointer;
            color: #000000;
            padding: 0 0.3rem;
            font-weight: 400;
        }
        .close-menu:hover {
            opacity: 0.7;
        }

        .sidebar h2 {
            font-weight: 600;
            font-size: 2.2rem;
            letter-spacing: -0.02em;
            margin-bottom: 1.8rem;
            color: #000000;
            border-bottom: 2px solid #000000;  /* чёрная линия */
            padding-bottom: 0.5rem;
            padding-right: 2rem;
        }

        .menu-item {
            background: none;
            border: none;
            font-family: inherit;
            font-size: 1.4rem;
            font-weight: 400;
            text-align: left;
            padding: 0.8rem 1rem;
            color: #000000;
            cursor: pointer;
            transition: 0.1s;
            width: 100%;
            border-radius: 0;  /* строго прямоугольно */
        }
        .menu-item:hover {
            background-color: #000000;  /* чёрный фон при наведении */
            color: #ffa500;            /* оранжевый текст */
        }
        .menu-item.active {
            background-color: #000000;
            color: #ffa500;
            font-weight: 600;
        }

        /* --- Основная белая часть (чистый белый) --- */
        .main-content {
            flex: 1;
            background-color: #ffffff;
            display: flex;
            flex-direction: column;
            position: relative;
            min-width: 0;
        }

        .open-menu {
            position: absolute;
            top: 1.5rem;
            left: 1.5rem;
            background: #ffa500;
            border: 2px solid #000000;
            font-size: 2rem;
            padding: 0.2rem 1.2rem;
            cursor: pointer;
            color: #000000;
            z-index: 10;
            display: none;
            font-weight: 400;
            line-height: 1;
        }
        .open-menu:hover {
            background-color: #000000;
            color: #ffa500;
        }

        .content-center {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .pane-container {
            width: 100%;
            max-width: 800px;
            text-align: center;
        }

        .tab-pane {
            display: none;
        }
        .tab-pane.active-pane {
            display: block;
        }

        .placeholder-message {
            font-size: 2.2rem;
            font-weight: 400;
            color: #000000;  /* чёрный */
            line-height: 1.5;
        }
        .placeholder-message small {
            display: block;
            font-size: 1.3rem;
            color: #000000;
            font-weight: 400;
            margin-top: 1.5rem;
            border-top: 2px solid #000000;
            padding-top: 1rem;
        }

        /* --- Состояние: меню скрыто --- */
        .app.sidebar-collapsed .sidebar {
            width: 0;
            padding: 0;
        }
        .app.sidebar-collapsed .open-menu {
            display: block;
        }

        /* Адаптивность */
        @media (max-width: 650px) {
            .app {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                padding: 1.5rem;
            }
            .close-menu {
                top: 0.8rem;
                right: 1rem;
            }
            .app.sidebar-collapsed .sidebar {
                width: 0;
                padding: 0;
            }
            .open-menu {
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="app" id="app">
        <!-- Оранжевое меню -->
        <div class="sidebar" id="sidebar">
            <button class="close-menu" id="closeMenuBtn" aria-label="Закрыть меню">✕</button>
            <h2>язык ·</h2>
            <button class="menu-item active" data-tab="about">О языке</button>
            <button class="menu-item" data-tab="alphabet">Алфавит</button>
            <button class="menu-item" data-tab="rules">Правила</button>
            <button class="menu-item" data-tab="exercises">Упражнения</button>
        </div>

        <!-- Белая область контента -->
        <div class="main-content">
            <button class="open-menu" id="openMenuBtn">☰</button>
            <div class="content-center">
                <div class="pane-container">
                    <div id="about" class="tab-pane active-pane">
                        <div class="placeholder-message">
                            🌅 ничего нет
                            <small>раздел об языке</small>
                        </div>
                    </div>
                    <div id="alphabet" class="tab-pane">
                        <div class="placeholder-message">
                            🔤 ничего нет
                            <small>алфавит</small>
                        </div>
                    </div>
                    <div id="rules" class="tab-pane">
                        <div class="placeholder-message">
                            📘 ничего нет
                            <small>правила</small>
                        </div>
                    </div>
                    <div id="exercises" class="tab-pane">
                        <div class="placeholder-message">
                            ✏️ ничего нет
                            <small>упражнения</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        (function() {
            const app = document.getElementById('app');
            const closeBtn = document.getElementById('closeMenuBtn');
            const openBtn = document.getElementById('openMenuBtn');

            const menuItems = document.querySelectorAll('.menu-item');
            const panes = {
                about: document.getElementById('about'),
                alphabet: document.getElementById('alphabet'),
                rules: document.getElementById('rules'),
                exercises: document.getElementById('exercises')
            };

            // Закрыть меню
            closeBtn.addEventListener('click', () => {
                app.classList.add('sidebar-collapsed');
            });

            // Открыть меню
            openBtn.addEventListener('click', () => {
                app.classList.remove('sidebar-collapsed');
            });

            // Переключение вкладок
            function switchTab(tabId) {
                menuItems.forEach(item => item.classList.remove('active'));
                const activeItem = document.querySelector(`.menu-item[data-tab="${tabId}"]`);
                if (activeItem) activeItem.classList.add('active');

                Object.values(panes).forEach(pane => pane?.classList.remove('active-pane'));
                if (panes[tabId]) panes[tabId].classList.add('active-pane');
            }

            menuItems.forEach(item => {
                item.addEventListener('click', (e) => {
                    const tabId = item.getAttribute('data-tab');
                    switchTab(tabId);
                });
            });

            // Инициализация
            const initialActive = document.querySelector('.menu-item.active');
            if (initialActive) {
                const initialTab = initialActive.getAttribute('data-tab');
                if (initialTab && panes[initialTab]) {
                    Object.values(panes).forEach(p => p?.classList.remove('active-pane'));
                    panes[initialTab].classList.add('active-pane');
                }
            } else {
                switchTab('about');
            }
        })();
    </script>
</body>
</html>
```
