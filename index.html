<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
    <title>Вакеатэ Мовын · словарь</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* ----- ОСНОВНЫЕ НАСТРОЙКИ (CSS) ----- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #fcfaf2;
            --txt: #2d2d2d;
            --card: #ffffff;
            --gold-grad: linear-gradient(135deg, #ffd700 0%, #d4af37 100%);
            --accent: #d4af37;
            --accent-rgb: 212, 175, 55; /* для rgba */
            --glass: rgba(252, 250, 242, 0.9);
            --card-shadow: 0 10px 30px rgba(212, 175, 55, 0.12);
            --border-light: rgba(212, 175, 55, 0.15);
            --header-border: rgba(212, 175, 55, 0.2);
        }

        [data-theme="dark"] {
            --bg: #0d0d0d;
            --txt: #f5f5f5;
            --card: #1a1a1a;
            --glass: rgba(13, 13, 13, 0.9);
            --card-shadow: 0 10px 40px rgba(0, 0, 0, 0.6);
            --border-light: rgba(212, 175, 55, 0.2);
            --header-border: rgba(212, 175, 55, 0.3);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--txt);
            transition: background-color 0.3s, color 0.2s;
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ---------- ШАПКА ---------- */
        header {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: var(--glass);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--header-border);
            padding: 12px 6%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px 8px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        .logo-img {
            width: 42px;
            height: 42px;
            object-fit: contain;
            transition: transform 0.2s;
        }
        .logo-container:hover .logo-img {
            transform: rotate(4deg) scale(1.02);
        }

        .logo-text {
            font-weight: 800;
            font-size: 1.3rem;
            background: var(--gold-grad);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 0.5px;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }

        .nav-links {
            display: flex;
            gap: 8px;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--txt);
            font-weight: 700;
            font-size: 0.95rem;
            padding: 8px 14px;
            border-radius: 30px;
            background: transparent;
            transition: 0.2s;
            cursor: pointer;
            border: 1px solid transparent;
        }

        .nav-links a:hover {
            background: var(--gold-grad);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 6px 14px rgba(var(--accent-rgb), 0.3);
        }

        #theme-btn {
            background: var(--gold-grad);
            border: none;
            color: white;
            padding: 8px 22px;
            border-radius: 40px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(var(--accent-rgb), 0.35);
            transition: 0.2s;
            border: 1px solid rgba(255,255,255,0.2);
        }
        #theme-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 22px rgba(var(--accent-rgb), 0.5);
        }

        /* ---------- ВЫБОР ЦВЕТА ---------- */
        .color-picker {
            display: flex;
            gap: 8px;
            align-items: center;
            margin-left: 10px;
        }
        .color-dot {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .color-dot:hover {
            transform: scale(1.15);
            border-color: white;
        }
        .color-dot.active {
            border-color: white;
            box-shadow: 0 0 0 2px var(--accent);
        }

        /* ---------- ПОДСКАЗКА ПРОИЗНОШЕНИЯ ---------- */
        #speech-bubble {
            position: fixed;
            top: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold-grad);
            color: white;
            padding: 12px 30px;
            border-radius: 60px;
            font-weight: 700;
            font-size: 1.1rem;
            display: none;
            z-index: 2000;
            box-shadow: 0 16px 40px rgba(var(--accent-rgb), 0.5);
            animation: pop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            white-space: nowrap;
            max-width: 90vw;
            text-overflow: ellipsis;
            overflow: hidden;
            pointer-events: none;
            border: 1px solid rgba(255,255,240,0.4);
        }

        @keyframes pop {
            from { opacity: 0; transform: translateX(-50%) scale(0.8); }
            to { opacity: 1; transform: translateX(-50%) scale(1); }
        }

        /* ---------- ОСНОВНОЙ КОНТЕЙНЕР ---------- */
        main {
            padding: 40px 6%;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            flex: 1;
        }

        .content-section {
            display: none;
            animation: fadeIn 0.5s ease both;
        }

        .content-section.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 25px;
            font-size: 2rem;
            border-left: 6px solid var(--accent);
            padding-left: 18px;
        }

        /* ---------- СЕТКА АЛФАВИТА ---------- */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 28px;
            padding: 32px 8px;
            text-align: center;
            font-size: 2.5rem;
            font-weight: 800;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            cursor: help;
            transition: 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
            line-height: 1;
        }

        .card:hover {
            transform: translateY(-10px) rotate(1.5deg);
            border-color: var(--accent);
            box-shadow: 0 20px 40px rgba(var(--accent-rgb), 0.25);
        }

        /* ---------- СЛОВАРЬ + ФИЛЬТРЫ ---------- */
        .filter-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 25px;
            align-items: center;
        }
        .filter-tag {
            background: var(--card);
            border: 1px solid var(--border-light);
            color: var(--txt);
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: var(--card-shadow);
        }
        .filter-tag:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }
        .filter-tag.active {
            background: var(--gold-grad);
            color: white;
            border-color: transparent;
        }

        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }

        .vocab-card {
            background: var(--card);
            border-radius: 24px;
            padding: 24px 20px;
            box-shadow: var(--card-shadow);
            border-left: 8px solid var(--accent);
            transition: 0.2s;
            border: 1px solid var(--border-light);
            backdrop-filter: blur(4px);
        }

        .vocab-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 18px 30px rgba(var(--accent-rgb), 0.2);
        }

        .vocab-word {
            font-weight: 800;
            font-size: 2rem;
            color: var(--accent);
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .vocab-part {
            display: inline-block;
            background: rgba(var(--accent-rgb), 0.15);
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 10px;
            color: var(--accent);
        }

        .vocab-trans {
            font-size: 1.2rem;
            opacity: 0.85;
            border-top: 2px dashed var(--border-light);
            padding-top: 12px;
            font-style: italic;
        }

        .empty-msg {
            text-align: center;
            padding: 60px 20px;
            font-size: 1.3rem;
            opacity: 0.5;
            font-style: italic;
            font-weight: 600;
            border: 2px dashed rgba(var(--accent-rgb), 0.25);
            border-radius: 40px;
            background: var(--card);
        }

        /* ---------- ЦИТАТЫ ---------- */
        .quote-block {
            background: var(--card);
            border-radius: 40px;
            padding: 40px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--border-light);
            max-width: 700px;
            margin: 30px auto;
        }
        .quote-text {
            font-size: 2rem;
            font-weight: 800;
            line-height: 1.4;
            margin-bottom: 20px;
            color: var(--accent);
        }
        .quote-author {
            font-size: 1.2rem;
            opacity: 0.7;
            text-align: right;
            font-style: italic;
        }

        /* ---------- ДОПОЛНИТЕЛЬНО ---------- */
        .highlight {
            font-weight: 800;
            color: var(--accent);
            background: linear-gradient(145deg, transparent 50%, rgba(var(--accent-rgb), 0.1) 90%);
            padding: 0 4px;
        }

        footer {
            text-align: center;
            padding: 25px;
            opacity: 0.5;
            font-size: 0.9rem;
        }

        @media (max-width: 550px) {
            .logo-text { font-size: 1.1rem; }
            .nav-links a { padding: 6px 12px; font-size: 0.85rem; }
            #theme-btn { padding: 6px 16px; }
            .card { font-size: 2rem; padding: 25px 5px; }
            .vocab-word { font-size: 1.7rem; }
        }
    </style>
</head>
<body>

<!-- плавающее произношение -->
<div id="speech-bubble"></div>

<!-- ШАПКА с логотипом и новым пунктом "Цитаты" -->
<header>
    <div class="logo-container" onclick="showSection('home')">
        <img id="main-logo" src="logo.png" alt="Лого" class="logo-img">
        <div class="logo-text">Вакеатэ Мовын</div>
    </div>
    <div class="nav-right">
        <nav class="nav-links">
            <a onclick="showSection('alphabet')">Буквы</a>
            <a onclick="showSection('vocab')">Слова</a>
            <a onclick="showSection('quotes')">Цитаты</a>   <!-- новый пункт -->
        </nav>
        <!-- Выбор акцентного цвета -->
        <div class="color-picker" id="colorPicker">
            <div class="color-dot active" style="background: #d4af37;" data-color="gold" title="Золотой"></div>
            <div class="color-dot" style="background: #3b82f6;" data-color="blue" title="Синий"></div>
            <div class="color-dot" style="background: #22c55e;" data-color="green" title="Зелёный"></div>
            <div class="color-dot" style="background: #ef4444;" data-color="red" title="Красный"></div>
            <div class="color-dot" style="background: #a855f7;" data-color="purple" title="Фиолетовый"></div>
        </div>
        <button id="theme-btn" onclick="cycleTheme()">🌓 Тема</button>
    </div>
</header>

<main>
    <!-- Главная — добро пожаловать -->
    <section id="home" class="content-section active">
        <h1 style="font-weight: 800; font-size: clamp(2rem, 8vw, 3.5rem);">Добро пожаловать! 👋</h1>
        <p style="font-size: 1.3rem; opacity: 0.8; line-height: 1.6; max-width: 700px;">
            Здесь вы найдёте алфавит, словарь и мудрые цитаты языка Вакеатэ Мовын.
        </p>
        <p style="margin-top: 30px; font-size: 1.1rem;">✨ В словарь добавлены новые выражения.</p>
    </section>

    <!-- Алфавит -->
    <section id="alphabet" class="content-section">
        <h2>✧ Алфавит</h2>
        <div class="grid" id="alpha-grid"></div>
    </section>

    <!-- Словарь с фильтрацией по частям речи -->
    <section id="vocab" class="content-section">
        <h2>✧ Словарь</h2>
        <div class="filter-bar" id="filterBar"></div>
        <div id="vocab-list"></div>
    </section>

    <!-- Цитаты (новая секция) -->
    <section id="quotes" class="content-section">
        <h2>✧ Цитаты великих людей</h2>
        <div class="quote-block">
            <div class="quote-text">«почему я жаемна»</div>
            <div class="quote-author">— Сибилевца</div>
        </div>
    </section>
</main>

<!-- Подвал пустой (без лишней фразы) -->
<footer>
    <span></span>
</footer>

<script>
    (function() {
        /* --- БАЗА ДАННЫХ (алфавит + слова с частями речи) --- */
        const DATABASE = {
            alphabet: [
                { char: "А", pron: "а" }, { char: "Б", pron: "б" }, { char: "В", pron: "в" },
                { char: "Г", pron: "г" }, { char: "Д", pron: "д" }, { char: "Е", pron: "е" },
                { char: "Ё", pron: "ё" }, { char: "Ж", pron: "ж" }, { char: "Ӝ", pron: "жь" },
                { char: "З", pron: "з" }, { char: "Ӟ", pron: "зь" }, { char: "И", pron: "и" },
                { char: "ӥ", pron: "йи" }, { char: "Й", pron: "й" }, { char: "К", pron: "к" },
                { char: "Л", pron: "л" }, { char: "М", pron: "м" }, { char: "Н", pron: "н" },
                { char: "О", pron: "о" }, { char: "Ӧ", pron: "оу" }, { char: "П", pron: "п" },
                { char: "Р", pron: "р" }, { char: "С", pron: "с" }, { char: "Т", pron: "т" },
                { char: "У", pron: "у" }, { char: "Ф", pron: "ф" }, { char: "Х", pron: "х" },
                { char: "Ц", pron: "ц" }, { char: "Ч", pron: "тш" }, { char: "Ӵ", pron: "ч" },
                { char: "Ш", pron: "ш" }, { char: "Щ", pron: "щ" }, { char: "Ъ", pron: "твёрдый" },
                { char: "Ы", pron: "ы" }, { char: "Ь", pron: "мягкий" }, { char: "Ѣ", pron: "ых" },
                { char: "Э", pron: "э" }, { char: "Ю", pron: "ю" }, { char: "Я", pron: "я" }
            ],
            dictionary: [
                { word: "Жаёмна", translation: "потеряться в магазине ночью", part: "глагол" },
                { word: "Акоп", translation: "привет", part: "междометие" },
                { word: "Привытэх", translation: "пока", part: "междометие" }
            ]
        };

        // Состояние фильтра
        let currentFilter = 'все';

        /* --- ФУНКЦИИ --- */
        function showHint(text) {
            const bubble = document.getElementById('speech-bubble');
            if (!bubble) return;
            bubble.innerText = `🔊 [${text}]`;
            bubble.style.display = 'block';
        }

        function hideHint() {
            const bubble = document.getElementById('speech-bubble');
            if (bubble) bubble.style.display = 'none';
        }

        function cycleTheme() {
            const body = document.body;
            const current = body.getAttribute('data-theme') || 'light';
            const next = current === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', next);
            localStorage.setItem('vakeate-theme', next);
        }

        function showSection(id) {
            document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
            const section = document.getElementById(id);
            if (section) section.classList.add('active');
            if (id === 'vocab') {
                renderFilterBar();
                renderVocab(currentFilter);
            }
        }

        // Рендер алфавита
        function renderAlphabet() {
            const grid = document.getElementById('alpha-grid');
            if (!grid) return;
            grid.innerHTML = DATABASE.alphabet.map(item => {
                const pron = item.pron.replace(/'/g, "&apos;");
                return `<div class="card" 
                    onmouseenter="showHint('${pron}')" onmouseleave="hideHint()"
                    ontouchstart="showHint('${pron}')" ontouchend="hideHint()">
                    ${item.char}
                </div>`;
            }).join('');
        }

        // Получить уникальные части речи
        function getUniqueParts() {
            const parts = DATABASE.dictionary.map(entry => entry.part);
            return ['все', ...new Set(parts)];
        }

        // Рендер полосы фильтров
        function renderFilterBar() {
            const container = document.getElementById('filterBar');
            if (!container) return;
            const parts = getUniqueParts();
            container.innerHTML = parts.map(part => {
                const activeClass = part === currentFilter ? 'active' : '';
                return `<span class="filter-tag ${activeClass}" data-part="${part}">${part}</span>`;
            }).join('');

            // Добавляем обработчики на теги
            document.querySelectorAll('.filter-tag').forEach(tag => {
                tag.addEventListener('click', (e) => {
                    const part = e.target.dataset.part;
                    currentFilter = part;
                    renderFilterBar();  // перерисовать, чтобы подсветить активный
                    renderVocab(part);
                });
            });
        }

        // Рендер словаря с учётом фильтра
        function renderVocab(filter = 'все') {
            const container = document.getElementById('vocab-list');
            if (!container) return;

            let filtered = DATABASE.dictionary;
            if (filter !== 'все') {
                filtered = DATABASE.dictionary.filter(entry => entry.part === filter);
            }

            if (filtered.length === 0) {
                container.innerHTML = '<div class="empty-msg">📭 Нет слов этой части речи</div>';
                return;
            }

            let html = '<div class="vocab-grid">';
            filtered.forEach(entry => {
                html += `
                    <div class="vocab-card">
                        <div class="vocab-word">${entry.word}</div>
                        <div class="vocab-part">${entry.part}</div>
                        <div class="vocab-trans">${entry.translation}</div>
                    </div>
                `;
            });
            html += '</div>';
            container.innerHTML = html;
        }

        // Смена основного цвета
        function setAccentColor(color) {
            const root = document.documentElement;
            let accent, accentRgb;
            switch(color) {
                case 'gold':
                    accent = '#d4af37';
                    accentRgb = '212, 175, 55';
                    break;
                case 'blue':
                    accent = '#3b82f6';
                    accentRgb = '59, 130, 246';
                    break;
                case 'green':
                    accent = '#22c55e';
                    accentRgb = '34, 197, 94';
                    break;
                case 'red':
                    accent = '#ef4444';
                    accentRgb = '239, 68, 68';
                    break;
                case 'purple':
                    accent = '#a855f7';
                    accentRgb = '168, 85, 247';
                    break;
                default:
                    accent = '#d4af37';
                    accentRgb = '212, 175, 55';
            }
            root.style.setProperty('--accent', accent);
            root.style.setProperty('--accent-rgb', accentRgb);
            // Обновляем градиент (используем новый accent)
            root.style.setProperty('--gold-grad', `linear-gradient(135deg, ${accent} 0%, ${adjustBrightness(accent, -20)} 100%)`);

            // Подсветить активную точку
            document.querySelectorAll('.color-dot').forEach(dot => {
                dot.classList.toggle('active', dot.dataset.color === color);
            });
        }

        // Вспомогательная функция для затемнения цвета (для градиента)
        function adjustBrightness(hex, percent) {
            // Простая реализация: возвращаем тот же цвет, для градиента не критично
            // В реальном проекте можно использовать библиотеку, но здесь упростим
            return hex; // или вернуть чуть темнее, но для демо оставим так
        }

        // Инициализация выбора цвета
        function initColorPicker() {
            const dots = document.querySelectorAll('.color-dot');
            dots.forEach(dot => {
                dot.addEventListener('click', () => {
                    setAccentColor(dot.dataset.color);
                });
            });
        }

        function init() {
            const savedTheme = localStorage.getItem('vakeate-theme') || 'light';
            document.body.setAttribute('data-theme', savedTheme);

            renderAlphabet();
            renderFilterBar();
            renderVocab(currentFilter);
            showSection('home');
            initColorPicker();

            document.addEventListener('touchmove', function() {
                hideHint();
            }, { passive: true });
        }

        window.showHint = showHint;
        window.hideHint = hideHint;
        window.cycleTheme = cycleTheme;
        window.showSection = showSection;

        window.addEventListener('DOMContentLoaded', init);
    })();
</script>

</body>
</html>
